<div class="login-container">

    <div class="login-card">

        <!-- LOGO -->

        <div class="text-center mb-4">

            <img
                src="assets/img/logo.png"
                alt="Centro Médico Urkupina"
                class="logo"
            >

            <h2 class="titulo mt-3">
                Centro Médico Urkupina
            </h2>

            <p class="subtitulo">
                Sistema de gestión de sectores
            </p>

        </div>

        <!-- MENSAJE EXITO -->

        <div *ngIf="mensajeExito" class="alert alert-success">

            {{ mensajeExito }}

        </div>

        <!-- FORM -->

        <form
            [formGroup]="loginForm"
            (ngSubmit)="loguearse()"
        >

            <!-- DNI -->

            <div class="mb-3">

                <label class="form-label">
                    DNI
                </label>

                <input
                    type="text"
                    class="form-control input-custom"
                    formControlName="dni"
                    placeholder="Ingresá tu DNI"
                />

                <small
                    class="text-danger"
                    *ngIf="(loginForm.controls.dni.touched || submitted)
                    && loginForm.controls.dni.invalid"
                >

                    <span *ngIf="loginForm.controls.dni.errors?.['required']">

                        El DNI es obligatorio

                    </span>

                    <span *ngIf="loginForm.controls.dni.errors?.['pattern']">

                        El DNI debe tener 7 u 8 números

                    </span>

                </small>

            </div>

            <!-- PASSWORD -->

            <div class="mb-3">

                <label class="form-label">
                    Contraseña
                </label>

                <div class="password-container">

                    <input
                        [type]="mostrarPassword ? 'text' : 'password'"
                        class="form-control input-custom"
                        formControlName="password"
                        placeholder="Ingresá tu contraseña"
                    >

                    <button
                        type="button"
                        class="toggle-password"
                        (click)="togglePassword()"
                    >

                        {{ mostrarPassword ? 'Ocultar' : 'Ver' }}

                    </button>

                </div>

                <small
                    class="text-danger"
                    *ngIf="(loginForm.controls.password.touched || submitted)
                    && loginForm.controls.password.invalid"
                >

                    <span *ngIf="loginForm.controls.password.errors?.['required']">

                        La contraseña es obligatoria

                    </span>

                    <span *ngIf="loginForm.controls.password.errors?.['minlength']">

                        Debe tener al menos 2 caracteres

                    </span>

                </small>

            </div>

            <!-- BOTON LOGIN -->

            <button
                type="submit"
                class="btn boton-login w-100"
                [disabled]="loading"
            >

                {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}

            </button>

            <!-- ERROR -->

            <div
                *ngIf="mensajeError"
                class="alert alert-danger mt-3"
            >

                {{ mensajeError }}

            </div>

        </form>

    </div>

</div>
