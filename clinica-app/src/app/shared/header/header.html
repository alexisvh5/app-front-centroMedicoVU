<header class="header">

  <div class="logo-container">

    <img
      src="assets/img/logo.png"
      alt="Logo"
      class="logo"
    >

    <div>

      <a
        routerLink="/home"
        class="header-link"
      >

        <h1>Centro Médico Urkupiña</h1>

        <p>Sistema de gestión de sectores</p>

      </a>

    </div>

  </div>

  <div class="user-menu">
    <button class="user-btn" (click)="toggleMenu($event)">
      <span class="user-name">{{ authService.nombre$ | async }}</span>
      <span class="chevron" [class.open]="menuOpen">▼</span>
    </button>
    <div class="dropdown" *ngIf="menuOpen">
      <button class="dropdown-item" (click)="cerrarSesion(); $event.stopPropagation()">
        Cerrar sesión
      </button>
    </div>
  </div>

</header>
